name: build

# Pinned dependencies.
#
# Every third-party action is pinned to a full commit SHA and every container to
# an immutable digest, so a run is reproducible and an upstream retag cannot
# change what executes here. Each pin carries the human-readable release it came
# from; update the comment whenever the pin moves.
#
# To bump the TeX Live image, see CONTRIBUTING.md ("Bumping the pinned TeX Live
# image"). The `toolchain` job records the exact versions a run used; read its
# artifact to learn which TeX Live release a digest resolves to.
#
#   texlive/texlive        digest below == :latest as published 2026-07-12
#   actions/checkout       v4.3.1
#   actions/upload-artifact v7.0.1

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  toolchain:
    runs-on: ubuntu-latest
    container: texlive/texlive@sha256:d39efa547acfa518072600315280f92357ca8e0b9e295e09b6ccd5f5d82a1373
    steps:
      # actions/checkout v4.3.1: https://github.com/actions/checkout/releases/tag/v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # docs/ATS-EXTRACTION.md section 10 ("Reproducibility") requires the
      # tested toolchain to be recorded alongside the output it produced.
      - name: Record toolchain versions
        run: |
          {
            echo "# CareerDossierTeX toolchain record"
            echo "date-utc: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "commit:   ${GITHUB_SHA}"
            echo
            echo "## TeX Live"
            tlmgr --version 2>&1 || echo "tlmgr: unavailable"
            echo
            echo "## LuaHBTeX / LuaLaTeX format"
            lualatex --version 2>&1 | head -3
            echo "format: $(kpsewhich --engine=luahbtex --format=fmt lualatex.fmt || echo NOT-FOUND)"
            echo
            echo "## fontspec"
            kpsewhich fontspec.sty
            # fontspec declares {date}{version} on the line after
            # \ProvidesExplPackage, so -A1 is required to capture the version.
            grep -A1 -m1 'ProvidesExplPackage' "$(kpsewhich fontspec.sty)" || true
            echo
            echo "## PDF management"
            kpsewhich pdfmanagement-testphase.sty || echo "pdfmanagement-testphase: NOT-FOUND"
            grep -A1 -m1 'ProvidesExplPackage' "$(kpsewhich pdfmanagement-testphase.sty)" || true
            echo
            echo "## tagpdf (used once tagged fixtures are added)"
            kpsewhich tagpdf.sty || echo "tagpdf: NOT-FOUND"
            grep -A1 -m1 'ProvidesExplPackage' "$(kpsewhich tagpdf.sty)" || true
            echo
            echo "## l3build"
            l3build --version 2>&1 | head -4 || echo "l3build: unavailable"
            echo
            echo "## BibLaTeX / Biber"
            kpsewhich biblatex.sty || echo "biblatex: NOT-FOUND"
            biber --version 2>&1 | head -2 || echo "biber: unavailable"
            echo
            echo "## default fonts"
            for f in texgyretermes-regular.otf texgyreheros-regular.otf; do
              echo "$f -> $(kpsewhich "$f" || echo NOT-FOUND)"
            done
          } | tee toolchain.txt
      # actions/upload-artifact v7.0.1: https://github.com/actions/upload-artifact/releases/tag/v7.0.1
      - name: Upload toolchain record
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: toolchain-record
          path: toolchain.txt
          if-no-files-found: warn

  regression:
    runs-on: ubuntu-latest
    container: texlive/texlive@sha256:d39efa547acfa518072600315280f92357ca8e0b9e295e09b6ccd5f5d82a1373
    steps:
      # actions/checkout v4.3.1: https://github.com/actions/checkout/releases/tag/v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Module regression suite (l3build check on LuaTeX)
        run: l3build check
      # actions/upload-artifact v7.0.1: https://github.com/actions/upload-artifact/releases/tag/v7.0.1
      - name: Upload regression logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: regression-logs
          path: build/test/*.log
          if-no-files-found: warn

  extraction:
    runs-on: ubuntu-latest
    container: texlive/texlive@sha256:d39efa547acfa518072600315280f92357ca8e0b9e295e09b6ccd5f5d82a1373
    steps:
      # actions/checkout v4.3.1: https://github.com/actions/checkout/releases/tag/v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install poppler-utils
        run: apt-get update && apt-get install -y --no-install-recommends poppler-utils
      - name: Extraction round-trip
        run: tests/extraction/run.sh
      # actions/upload-artifact v7.0.1: https://github.com/actions/upload-artifact/releases/tag/v7.0.1
      - name: Upload extraction PDFs and logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: extraction-artifacts
          path: |
            tests/extraction/*.pdf
            tests/extraction/*.log
            tests/extraction/*.diff
          if-no-files-found: warn

  tagging:
    runs-on: ubuntu-latest
    container: texlive/texlive@sha256:d39efa547acfa518072600315280f92357ca8e0b9e295e09b6ccd5f5d82a1373
    steps:
      # actions/checkout v4.3.1: https://github.com/actions/checkout/releases/tag/v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # poppler-utils matches the extraction job. mupdf-tools supplies mutool,
      # the second independent extractor: Poppler and MuPDF linearize the
      # two-column entry header differently, so agreement between them is what
      # makes "reading order is preserved" a claim about the PDF rather than
      # about one library's heuristics.
      - name: Install poppler-utils and mupdf-tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends poppler-utils mupdf-tools
      # veraPDF is deliberately NOT installed here. Building it from source
      # (maven + a JDK) adds several minutes that this per-PR job should not
      # pay on every push; the weekly `verapdf-scheduled` workflow
      # (.github/workflows/verapdf-scheduled.yml) builds it from a pinned
      # commit and runs this same gate instead (issue #94). The runner skips
      # the gate here with a notice and names it in its closing summary, so a
      # CI pass in this job is not mistaken for a validated one.
      #
      # The PDFKit gate likewise cannot run on Linux; it is covered locally on
      # macOS and by the committed *.pdfkit.txt baselines.
      - name: Tagged-PDF structure, extraction, and geometry fixtures
        run: tests/tagging/run.sh
      # actions/upload-artifact v7.0.1: https://github.com/actions/upload-artifact/releases/tag/v7.0.1
      - name: Upload tagging reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: tagging-reports
          path: tests/tagging/reports/
          if-no-files-found: warn

  resume:
    runs-on: ubuntu-latest
    container: texlive/texlive@sha256:d39efa547acfa518072600315280f92357ca8e0b9e295e09b6ccd5f5d82a1373
    steps:
      # actions/checkout v4.3.1: https://github.com/actions/checkout/releases/tag/v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install poppler-utils
        run: apt-get update && apt-get install -y --no-install-recommends poppler-utils
      - name: Smoke tests (supported builds and required failures)
        run: tests/smoke/run.sh
      - name: Layout-stress tests
        run: tests/layout/run.sh
      - name: Build the résumé example
        run: >-
          latexmk -lualatex -interaction=nonstopmode -halt-on-error
          examples/industry/resume-english.tex
      # actions/upload-artifact v7.0.1: https://github.com/actions/upload-artifact/releases/tag/v7.0.1
      - name: Upload résumé PDFs and logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: resume-artifacts
          path: |
            tests/smoke/*.pdf
            tests/smoke/*.log
            tests/smoke/*.stdout
            tests/layout/*.pdf
            tests/layout/*.log
            tests/layout/*.stdout
            resume-english.pdf
            resume-english.log
          if-no-files-found: warn

  letter:
    runs-on: ubuntu-latest
    container: texlive/texlive@sha256:d39efa547acfa518072600315280f92357ca8e0b9e295e09b6ccd5f5d82a1373
    steps:
      # actions/checkout v4.3.1: https://github.com/actions/checkout/releases/tag/v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Build the cover-letter example
        run: >-
          latexmk -lualatex -interaction=nonstopmode -halt-on-error
          examples/industry/letter-industry.tex
      # actions/upload-artifact v7.0.1: https://github.com/actions/upload-artifact/releases/tag/v7.0.1
      - name: Upload cover-letter PDF and log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: letter-artifacts
          path: |
            letter-industry.pdf
            letter-industry.log
          if-no-files-found: warn

  cv:
    runs-on: ubuntu-latest
    container: texlive/texlive@sha256:d39efa547acfa518072600315280f92357ca8e0b9e295e09b6ccd5f5d82a1373
    steps:
      # actions/checkout v4.3.1: https://github.com/actions/checkout/releases/tag/v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install poppler-utils
        run: apt-get update && apt-get install -y --no-install-recommends poppler-utils
      - name: Build the academic CV examples
        run: make bibliography-test academic-cv academic-bibliography
      # actions/upload-artifact v7.0.1: https://github.com/actions/upload-artifact/releases/tag/v7.0.1
      - name: Upload academic CV PDFs and logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: academic-cv-artifacts
          path: |
            cv-academic.pdf
            cv-academic.log
            cv-bibliography.pdf
            cv-bibliography.log
            cv-bibliography.blg
            tests/bibliography/*.pdf
            tests/bibliography/*.log
            tests/bibliography/*.blg
            tests/bibliography/*.diff
          if-no-files-found: warn

  academic-letter:
    runs-on: ubuntu-latest
    container: texlive/texlive@sha256:d39efa547acfa518072600315280f92357ca8e0b9e295e09b6ccd5f5d82a1373
    steps:
      # actions/checkout v4.3.1: https://github.com/actions/checkout/releases/tag/v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Build the academic letter example
        run: >-
          latexmk -lualatex -interaction=nonstopmode -halt-on-error
          examples/academic/letter-academic.tex
      # actions/upload-artifact v7.0.1: https://github.com/actions/upload-artifact/releases/tag/v7.0.1
      - name: Upload academic letter PDF and log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: academic-letter-artifacts
          path: |
            letter-academic.pdf
            letter-academic.log
          if-no-files-found: warn

  statement:
    runs-on: ubuntu-latest
    container: texlive/texlive@sha256:d39efa547acfa518072600315280f92357ca8e0b9e295e09b6ccd5f5d82a1373
    steps:
      # actions/checkout v4.3.1: https://github.com/actions/checkout/releases/tag/v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Build all six statement examples
        run: make statements
      # actions/upload-artifact v7.0.1: https://github.com/actions/upload-artifact/releases/tag/v7.0.1
      - name: Upload statement PDFs and logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: statement-artifacts
          path: |
            research-statement.pdf
            research-statement.log
            teaching-statement.pdf
            teaching-statement.log
            teaching-philosophy-statement.pdf
            teaching-philosophy-statement.log
            diversity-statement.pdf
            diversity-statement.log
            artist-statement.pdf
            artist-statement.log
            statement-of-purpose.pdf
            statement-of-purpose.log
          if-no-files-found: warn
